name: Supabase keep-alive

on:
  schedule:
    - cron: '0 9 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf \
            "https://ofjletuwsemgxhlpwhmn.supabase.co/rest/v1/mensal_consolidado?select=ano&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
